<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="game-container">
      <header class="scoreboard">
        <div class="score-value">
          <div class="score-label">Points</div>
          <div id="points">0</div>
        </div>
        <div class="stats">
          <div id="clickPower">Power: 1</div>
          <div id="critInfo">Crit: 10% x2</div>
        </div>
      </header>

      <button id="clicker" class="clicker">
        <span>Tap</span>
      </button>

      <div id="feedback" class="feedback">Welcome! Click the button to earn points.</div>
      <button id="toggle-panel" class="toggle-panel">Hide upgrades & perks</button>

      <div class="panel">
        <section class="card">
          <div class="section-title">Upgrades</div>
          <div id="upgrade-list" class="list"></div>
        </section>
        <section class="card">
          <div class="section-title">Perks</div>
          <div id="perk-list" class="list"></div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
